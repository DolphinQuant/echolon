name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      # Force Python's UTF-8 mode globally on every runner. Eliminates a
      # whole class of cp1252 / charmap codec errors on Windows for any
      # library code that prints Unicode glyphs (`→`, `✓`, em-dashes)
      # or reads source/markdown files. Has been a stable Python feature
      # since 3.7. Equivalent to passing `-X utf8`.
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --ignore=tests/live
